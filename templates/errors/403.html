{% extends "layout.html" %}
{% set hide_sidebar = true %}
{% block title %}403{% endblock %}
{% block auth_content %}
<div class="error-page">
    <div class="error-code">403</div>
    <h1 style="margin:1rem 0 0.5rem;">Access Denied</h1>
    <p style="color:var(--text-secondary);margin-bottom:1.5rem;">You don't have permission to view this page.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
